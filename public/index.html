<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScamShield — Is This a Scam?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: #ffffff;
    padding: 18px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1e1b4b;
  }

  header p {
    font-size: 13px;
    color: #6b7280;
    margin-top: 1px;
  }

  .hero {
    text-align: center;
    padding: 48px 24px 24px;
    max-width: 600px;
  }

  .hero h2 {
    font-size: 28px;
    font-weight: 800;
    color: #1e1b4b;
    line-height: 1.3;
  }

  .hero p {
    margin-top: 10px;
    color: #6b7280;
    font-size: 16px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    width: 90%;
    max-width: 580px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    margin-bottom: 24px;
  }

  textarea {
    width: 100%;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    height: 130px;
    transition: border 0.2s;
    color: #1f2937;
  }

  textarea:focus {
    outline: none;
    border-color: #4f46e5;
  }

  .divider {
    text-align: center;
    color: #9ca3af;
    margin: 16px 0;
    font-size: 14px;
  }

  .upload-area {
    border: 2px dashed #c7d2fe;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    background: #f5f3ff;
    transition: all 0.2s;
  }

  .upload-area:hover {
    background: #ede9fe;
    border-color: #4f46e5;
  }

  .upload-area input { display: none; }
  .upload-area p { color: #6b7280; font-size: 14px; margin-top: 6px; }
  .upload-area span { font-size: 32px; }

  #preview {
    margin-top: 12px;
    border-radius: 10px;
    max-width: 100%;
    display: none;
  }

  button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .result {
    display: none;
    background: white;
    border-radius: 20px;
    padding: 28px;
    width: 90%;
    max-width: 580px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    margin-bottom: 40px;
  }

  .verdict-badge {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 18px;
    margin-bottom: 16px;
  }

  .SCAM { background: #fee2e2; color: #dc2626; }
  .SUSPICIOUS { background: #fef3c7; color: #d97706; }
  .SAFE { background: #dcfce7; color: #16a34a; }

  .score-bar {
    background: #f3f4f6;
    border-radius: 50px;
    height: 10px;
    margin: 12px 0 20px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 50px;
    transition: width 1s ease;
  }

  .summary {
    font-size: 17px;
    color: #1f2937;
    font-weight: 600;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .flags h4, .action h4 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 8px;
  }

  .flags ul {
    list-style: none;
    margin-bottom: 20px;
  }

  .flags ul li {
    padding: 8px 12px;
    background: #fef3c7;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
    color: #92400e;
  }

  .flags ul li::before { content: "⚠️ "; }

  .action-box {
    background: #f0fdf4;
    border-radius: 12px;
    padding: 16px;
    color: #166534;
    font-size: 15px;
    line-height: 1.6;
  }

  .loading {
    text-align: center;
    padding: 20px;
    color: #6b7280;
    font-size: 15px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e5e7eb;
    border-top-color: #4f46e5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <div>
    <h1>ScamShield</h1>
    <p>Paste a message or upload a screenshot — we'll tell you the truth.</p>
  </div>
</header>

<div class="hero">
  <h2>Got a suspicious message?<br>Let's check it together.</h2>
  <p>Free. Private. No signup needed.</p>
</div>

<div class="card">
  <textarea id="textInput" placeholder="Paste the suspicious message, job offer, investment pitch, or anything that feels off..."></textarea>
  
  <div class="divider">— or upload a screenshot —</div>
  
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <span>📸</span>
    <p>Tap to upload a screenshot from WhatsApp, SMS, or email</p>
    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
  </div>
  
  <img id="preview" alt="Preview">
  
  <button id="analyzeBtn" onclick="analyze()">🔍 Check This Now</button>
</div>

<div class="result" id="result">
  <div id="resultContent"></div>
</div>

<script>
  function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('preview');
      img.src = ev.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    const text = document.getElementById('textInput').value.trim();
    const file = document.getElementById('fileInput').files[0];
    
    if (!text && !file) {
      alert('Please paste a message or upload a screenshot first.');
      return;
    }

    const btn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');

    btn.disabled = true;
    btn.textContent = 'Analyzing...';
    resultDiv.style.display = 'block';
    resultContent.innerHTML = '<div class="loading"><div class="spinner"></div>Reading the signs...</div>';

    const formData = new FormData();
    if (text) formData.append('text', text);
    if (file) formData.append('image', file);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      const r = data.result;
      const scoreColor = r.score > 70 ? '#dc2626' : r.score > 40 ? '#d97706' : '#16a34a';

      resultContent.innerHTML = `
        <span class="verdict-badge ${r.verdict}">${r.verdict === 'SCAM' ? '🚨 SCAM' : r.verdict === 'SUSPICIOUS' ? '⚠️ SUSPICIOUS' : '✅ LOOKS SAFE'}</span>
        <div class="score-bar"><div class="score-fill" style="width:${r.score}%;background:${scoreColor}"></div></div>
        <div class="summary">${r.summary}</div>
        ${r.red_flags && r.red_flags.length ? `<div class="flags"><h4>Red Flags Found</h4><ul>${r.red_flags.map(f => `<li>${f}</li>`).join('')}</ul></div>` : ''}
        <div class="action"><h4>What You Should Do</h4><div class="action-box">${r.what_to_do}</div></div>
      `;
    } catch (err) {
      resultContent.innerHTML = `<p style="color:red">Something went wrong: ${err.message}</p>`;
    }

    btn.disabled = false;
    btn.textContent = '🔍 Check This Now';
  }
</script>
</body>
</html>
